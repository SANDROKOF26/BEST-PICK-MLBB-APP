<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST PICK MLBB</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1015; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1a1c23; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .main-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 20%, #ffd700 50%, #b8860b 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
        }

        .slots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .slot { width: 80px; height: 80px; border: 2px dashed #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 10px; overflow: hidden; background: #252830; transition: 0.3s; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot.filled { border-style: solid; border-color: #ff4444; box-shadow: 0 0 15px rgba(255, 68, 68, 0.3); }

        #hero-search { padding: 15px; width: 90%; border-radius: 8px; border: 1px solid #444; background: #0f1015; color: white; margin-bottom: 15px; outline: none; font-size: 16px; }
        #hero-search:focus { border-color: #007bff; }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; border: 1px solid #333; padding: 15px; height: 400px; overflow-y: auto; background: #12141a; border-radius: 10px; }
        .hero-card { cursor: pointer; padding: 10px; background: #252830; border-radius: 8px; font-size: 12px; transition: 0.2s; border: 1px solid transparent; }
        .hero-card:hover { background: #3d4250; transform: translateY(-5px); border-color: #007bff; }
        .hero-card img { width: 60px; height: 60px; border-radius: 50%; display: block; margin: 0 auto 8px; border: 2px solid #444; }

        .suggestions { margin-top: 30px; padding: 20px; background: #12141a; border-radius: 12px; border: 1px solid #333; text-align: left; }
        .counter-card { background: #252830; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        .counter-header { background: #333; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #ff4444; }
        .counter-list { padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; }
        
        .counter-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 10px; border: 1px solid #444; }
        .counter-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #4caf50; object-fit: cover; }
        .counter-item span { color: gold; font-weight: bold; font-size: 14px; }

        button { margin-top: 20px; padding: 12px 30px; cursor: pointer; background: #c62828; color: white; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ff4444; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">BEST PICK MLBB</h1>
    
    <p style="color: #888; margin-bottom: 10px;">DRAFT INIMIGO (CLIQUE PARA SELECIONAR)</p>
    <div class="slots" id="enemy-team">
        <div class="slot">Vazio</div>
        <div class="slot">Vazio</div>
        <div class="slot">Vazio</div>
        <div class="slot">Vazio</div>
        <div class="slot">Vazio</div>
    </div>

    <input type="text" id="hero-search" placeholder="🔍 Buscar herói inimigo..." onkeyup="filterHeroes()">

    <div class="hero-grid" id="hero-list"></div>

    <button onclick="clearSelection()">Limpar Seleção</button>

    <div class="suggestions">
        <h3 style="text-align: center; color: #4caf50;">CONSELHO DE COUNTERS</h3>
        <div id="counter-results">Selecione heróis inimigos acima.</div>
    </div>
</div>

        { name: "ALDOUS", image: "ALDOUS.png", role: "Lutador", counters: ["Akai", "Chou", "Kaja", "Franco"] },

        { name: "TIGREAL", image: "TIGREAL.png", role: "Tanque", counters: ["Diggie", "Chou", "Franco", "Kaja"] },

        { name: "FRANCO", image: "FRANCO.png", role: "Tanque", counters: ["Diggie", "Chou", "Ruby", "Hylos"] },
        { name: "KHUFRA", image: "KHUFRA.png", role: "Tanque", counters: ["Franco", "Kaja", "Diggie", "Valir"] },
        { name: "ATLAS", image: "ATLAS.png", role: "Tanque", counters: ["Diggie", "Chou", "Franco"] },
        { name: "BELERICK", image: "BELERICK.png", role: "Tanque", counters: ["Karrie", "Lunox", "Valir"] },

        // MAGOS
        { name: "VEXANA", image: "VEXANA.png", role: "Mago", counters: ["Saber", "Natalia", "Lancelot", "Ling"] },
        { name: "NANA", image: "NANA.png", role: "Mago", counters: ["Saber", "Natalia", "Lancelot", "Ling"] },
        { name: "VALIR", image: "VALIR.png", role: "Mago", counters: ["Saber", "Natalia", "Lancelot", "Ling"] },
        { name: "EUDORA", image: "EUDORA.png", role: "Mago", counters: ["Chou", "Lancelot", "Benedetta"] },
        { name: "AURORA", image: "AURORA.png", role: "Mago", counters: ["Saber", "Helcurt", "Natalia"] }
    ];

    let selectedEnemies = [];

    // Lógica para carregar da pasta /img
    function displayHeroes() {
        const grid = document.getElementById('hero-list');
        grid.innerHTML = heroes.map(hero => `
            <div class="hero-card" onclick="selectHeroByName('${hero.name}')">
                <img src="img/${hero.image}" onerror="this.src='https://via.placeholder.com/60/222/fff?text=?'">
                <strong>${hero.name}</strong>
            </div>
        `).join('');
    }

    function selectHeroByName(name) {
        const hero = heroes.find(h => h.name === name);
        if (selectedEnemies.length < 5 && !selectedEnemies.includes(hero)) {
            selectedEnemies.push(hero);
            updateUI();
        }
    }

    function updateUI() {
        const slots = document.getElementById('enemy-team').children;
        for(let i=0; i<5; i++) {
            if(selectedEnemies[i]) {
                slots[i].innerHTML = `<img src="img/${selectedEnemies[i].image}" onerror="this.src='https://via.placeholder.com/80/222/fff?text=?'">`;
                slots[i].classList.add('filled');
            } else {
                slots[i].innerHTML = "Vazio";
                slots[i].classList.remove('filled');
            }
        }
        renderSuggestions();
    }

    function renderSuggestions() {
        const resultsDiv = document.getElementById('counter-results');
        if (selectedEnemies.length === 0) {
            resultsDiv.innerHTML = "Selecione heróis inimigos acima.";
            return;
        }

        resultsDiv.innerHTML = selectedEnemies.map(inimigo => `
            <div class="counter-card">
                <div class="counter-header">
                    <img src="img/${inimigo.image}" style="width: 35px; height: 35px; border-radius: 5px;" onerror="this.src='https://via.placeholder.com/35'">
                    <strong>Sugestões contra ${inimigo.name}</strong>
                </div>
                <div class="counter-list">
                    ${inimigo.counters.map(counterNome => {
                        const hEncontrado = heroes.find(h => h.name.toUpperCase() === counterNome.toUpperCase());
                        // Tenta buscar a imagem do counter na pasta img/
                        const cImg = hEncontrado ? hEncontrado.image : (counterNome.toUpperCase() + ".png");
                        return `
                            <div class="counter-item">
                                <img src="img/${cImg}" onerror="this.src='https://via.placeholder.com/50/222/fff?text=ITEM'">
                                <span>${counterNome}</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    function filterHeroes() {
        const filter = document.getElementById('hero-search').value.toLowerCase();
        const cards = document.getElementsByClassName('hero-card');
        Array.from(cards).forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(filter) ? "" : "none";
        });
    }

    function clearSelection() {
        selectedEnemies = [];
        updateUI();
        filterHeroes();
    }

    displayHeroes();
</script>

</html>
